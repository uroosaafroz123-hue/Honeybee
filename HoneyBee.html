    <h1>Honeybees</h1>
    <h2>welcome to learn about Honeybees!</h2>
    <p>Honeybees are highly social, flying insects of the genus Apis known for constructing perennial wax nests, complex
        communication, and
        producing honey</p>
    <h2>There are 3 types of Honey bees 1.Queen bee 2.drone 3.worker</h2>
    <h3>Queen bee</h3>
    <p> The heart and mother of the hive. She is the only fertile female and is responsible for laying up to 2,000 eggs
        per
        day. Queens are raised in specially enlarged cells and fed a diet exclusively of royal jelly.</p>
    <h3>drone bee</h3>
    <p>: The powerhouse of the colony. They are all infertile females and handle all the necessary chores: foraging for
        nectar,
        building wax combs, cleaning, guarding, and raising the young.</p>
    <h3>Worker bee</h3>
    <p>: The male bees in the colony. They hatch from unfertilized eggs and their sole purpose is to mate with virgin
        queens on
        their mating flights. Drones do not forage, build, or protect the hive</p>
